<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>반짝피크민</title>
    <style>
        body {
            text-align: center;
            font-size: 2rem;
            margin-top: 20%;
        }
    </style>
</head>
<body>
    <p id="message">✨ 반짝피크민이 말하길... ✨</p>
    <button onclick="showRandomMessage()">눌러서 확인하기</button>

    <script>
        function showRandomMessage() {
            const messages = [
                "잔잔하면서도 듣기 좋은 R&B 들으면서 밤산책🫠.",
                "청량한 K-POP 들으면서 시원한 바다가긔!🏝️",
                "신나는 VOCALOID 들으면서 달달한 카페가기.🍧",
                "에너지 넘치는 J-POP 들으면서 그림그리기!🎨",
                "유튜브 알고리즘 추천 플레이리스트 틀고 멍때리기.🙃"
            ];
            document.getElementById("message").innerText = messages[Math.floor(Math.random() * messages.length)];
        }
    </script>
</body>
</html>
